# Render Blueprint for the MapleMusic worker (free tier).
# Deploy: push this repo, then in Render → New → Blueprint, point at the repo.
# Set SUPABASE_URL and SUPABASE_SERVICE_ROLE_KEY in the dashboard (sync: false).
services:
  - type: web
    name: maplemusic-worker
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./apps/worker/Dockerfile
    dockerContext: .
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: PUBLIC_AUDIO
        value: 'true'
      - key: AUDIO_BITRATE
        value: 128k
